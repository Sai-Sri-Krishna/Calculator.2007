<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Mini Calculator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a1a;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #calculator-container {
      padding: 25px;
      background-color: #2d2d2d;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      width: 320px;
    }

    .display-screen {
      background-color: #f4f4f4;
      border-radius: 12px;
      padding: 20px;
      text-align: right;
      margin-bottom: 20px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    }

    .cal-title {
      font-size: 14px;
      color: #888;
      margin: 0 0 5px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .calculation-output {
      color: #222;
      font-size: 32px;
      font-weight: bold;
      margin: 0;
      min-height: 40px;
      word-wrap: break-word;
      overflow-x: auto;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      
    }

    .btn {
      height: 60px;
      border-radius: 50%;
      border: none;
      font-size: 22px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, filter 0.2s;
    }

    .btn:active { transform: scale(0.95); }

    .gray-btn { background-color: #444; color: white; }
    .gray-btn:hover { filter: brightness(1.3); }

    .orange-btn { background-color: #ff9500; color: white; }
    .orange-btn:hover { filter: brightness(1.2); }

    .double-width {
      grid-column: span 2;
      border-radius: 30px;
    }
   @media (min-width: 768px) {
      .btn { 
        height: 80px; /* Taller buttons for PC */
        font-size: 26px; 
      }
      #calculator-container { 
        width: 380px; /* Wider for PC */
      }
    }

    /* Mobile View */
    @media (max-width: 767px) {
      .btn { 
        height: 65px; /* Comfortable touch size for mobile */
        font-size: 22px; 
      }
      #calculator-container { 
        width: 90%; 
        max-width: 340px; 
      }
    }
  </style>
</head>
<body>

  <div id="calculator-container">
    <div class="display-screen">
      <p class="cal-title">Mini Calculator</p>
      <p id="display" class="calculation-output"></p>
    </div>

    <div class="button-grid">
      <button class="btn gray-btn" onclick="updateCalculation('7')">7</button>
      <button class="btn gray-btn" onclick="updateCalculation('8')">8</button>
      <button class="btn gray-btn" onclick="updateCalculation('9')">9</button>
      <button class="btn orange-btn" onclick="updateCalculation(' / ')">/</button>

      <button class="btn gray-btn" onclick="updateCalculation('4')">4</button>
      <button class="btn gray-btn" onclick="updateCalculation('5')">5</button>
      <button class="btn gray-btn" onclick="updateCalculation('6')">6</button>
      <button class="btn orange-btn" onclick="updateCalculation(' * ')">*</button>

      <button class="btn gray-btn" onclick="updateCalculation('1')">1</button>
      <button class="btn gray-btn" onclick="updateCalculation('2')">2</button>
      <button class="btn gray-btn" onclick="updateCalculation('3')">3</button>
      <button class="btn orange-btn" onclick="updateCalculation(' - ')">-</button>

      <button class="btn gray-btn" onclick="updateCalculation('0')">0</button>
      <button class="btn gray-btn" onclick="updateCalculation('.')">.</button>
      <button class="btn orange-btn" onclick="calculate()">=</button>
      <button class="btn orange-btn" onclick="updateCalculation(' + ')">+</button>

      <button class="btn gray-btn double-width" onclick="backspace()">DEL</button>
      <button class="btn gray-btn double-width" onclick="clearCalculation()">CLEAR</button>
    </div>
  </div>

  <script>
    let calculation = localStorage.getItem('calculation') || '';
    const displayElement = document.getElementById('display');
    
    displayCalculation();

    function updateCalculation(value) {
      // Prevent consecutive operators
      const operators = [' + ', ' - ', ' * ', ' / '];
      const lastCharIsOperator = operators.some(op => calculation.endsWith(op));
      const newValueIsOperator = operators.includes(value);

      if (calculation === 'Error') calculation = '';

      if (lastCharIsOperator && newValueIsOperator) {
        // Replace old operator with new one
        calculation = calculation.slice(0, -3) + value;
      } else {
        calculation += value;
      }

      displayCalculation();
      saveToStorage();
    }

    function calculate() {
      if (!calculation) return;
      try {
        // Using Number() and toFixed() to fix JS floating point math issues (like 0.1+0.2)
        let result = Function(`'use strict'; return (${calculation})`)();
        calculation = Number(result.toFixed(10)).toString();
      } catch {
        calculation = 'Error';
      }
      displayCalculation();
      saveToStorage();
    }

    function clearCalculation() {
      calculation = '';
      displayCalculation();
      saveToStorage();
    }

    function backspace() {
      if (calculation === 'Error') return clearCalculation();
      
      // If ends with an operator (which has spaces), remove 3 chars, else remove 1
      if (calculation.endsWith(' ')) {
        calculation = calculation.slice(0, -3);
      } else {
        calculation = calculation.slice(0, -1);
      }
      displayCalculation();
      saveToStorage();
    }

    function displayCalculation() {
      displayElement.innerText = calculation || '0';
    }

    function saveToStorage() {
      localStorage.setItem('calculation', calculation);
    }

    // NEW: Physical Keyboard Support
    document.addEventListener('keydown', (event) => {
      const key = event.key;
      if (/[0-9]/.test(key)) updateCalculation(key);
      if (['+', '-', '*', '/'].includes(key)) updateCalculation(` ${key} `);
      if (key === 'Enter' || key === '=') calculate();
      if (key === 'Backspace') backspace();
      if (key === 'Escape') clearCalculation();
      if (key === '.') updateCalculation('.');
    });
  </script>
</body>
</html>
